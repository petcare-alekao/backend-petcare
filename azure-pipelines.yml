# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
- main

pool:
  vmImage: ubuntu-latest

steps:
- script: |
    docker compose up -d --build
  displayName: 'Subir containers com Docker Compose'

- script: |
    docker compose ps
  displayName: 'Verificar status dos containers'

- script: |
    docker compose down
  displayName: 'Derrubar containers'
