spring:
  rabbitmq:
    virtual-host: PetCareMQ
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}
    port: 5672

  application:
    name: pet-care
  config:
    import: optional:file:.env[.properties]
  profiles:
    default: dev
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: ${DB_DRIVER_CLASS_NAME:oracle.jdbc.OracleDriver}
  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: ${FLYWAY_BASELINE_ON_MIGRATE:true}

security:
  jwt:
    secret: ${JWT_SECRET}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:60}

app:
  cors:
    allowed-origin-patterns: ${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*,http://192.168.*:*,http://10.*:*,http://172.*:*}
  email:
    from: ${SES_FROM_EMAIL}
  aws:
    ses-endpoint: ${AWS_SES_ENDPOINT:https://email.${AWS_REGION}.amazonaws.com}
  messaging:
    consultation-created:
      queue: ${RABBITMQ_CONSULTATION_CREATED_QUEUE:emailSender}
      exchange: ${RABBITMQ_CONSULTATION_CREATED_EXCHANGE:emailSender-ex}
      routing-key: ${RABBITMQ_CONSULTATION_CREATED_ROUTING_KEY:emailSender-rk}
      dlq:
        queue: ${RABBITMQ_CONSULTATION_CREATED_DLQ_QUEUE:emailSender.dlq}
        exchange: ${RABBITMQ_CONSULTATION_CREATED_DLQ_EXCHANGE:emailSender-dlx}
        routing-key: ${RABBITMQ_CONSULTATION_CREATED_DLQ_ROUTING_KEY:emailSender-dlq-rk}
